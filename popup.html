<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-raised: #f5f5f5;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.14);
      --text: #111111;
      --text-secondary: #555555;
      --text-tertiary: #999999;
      --accent: #3fb950;
      --accent-bg: #eaf3de;
      --radius: 8px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --surface: #1c1c1e;
        --surface-raised: #2c2c2e;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --text: #f0f0f0;
        --text-secondary: #999999;
        --text-tertiary: #555555;
        --accent: #3fb950;
        --accent-bg: #0e2110;
      }
    }

    body {
      width: 320px;
      min-height: 120px;
      max-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }



    .header-platform {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* ─── STATES ─── */

    /* Loading */
    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      gap: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border-strong);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* Unsupported */
    .state-unsupported {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 10px;
    }

    .unsupported-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .unsupported-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-tertiary);
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .unsupported-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .unsupported-body {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.55;
      font-weight: 400;
    }

    .unsupported-platforms {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .unsupported-chip {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      background: var(--surface);
    }

    /* Error */
    .state-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 10px;
    }

    .error-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2d1215;
      border: 1px solid rgba(248, 81, 73, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    @media (prefers-color-scheme: light) {
      .error-icon {
        background: #fff5f5;
        border: 1px solid rgba(248, 81, 73, 0.15);
      }
    }

    .error-icon svg {
      width: 16px;
      height: 16px;
      stroke: #f85149;
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .error-body {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.55;
      font-weight: 400;
    }

    /* ─── PREVIEW ─── */
    .state-ready {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stats-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 16px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border-strong);
      transition: .2s ease;
      border-radius: 16px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 2px;
      bottom: 2px;
      background-color: var(--surface);
      transition: .2s ease;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    input:checked + .slider {
      background-color: var(--accent);
    }

    input:checked + .slider:before {
      transform: translateX(12px);
    }

    .stat {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-value {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      min-height: 0;
    }

    .preview-text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 4;
    }

    .preview-text .preview-header {
      color: var(--text-tertiary);
    }

    .preview-text .preview-key {
      color: var(--text);
      font-weight: 500;
    }

    .preview-text .preview-val {
      color: var(--accent);
    }

    /* ─── FOOTER ─── */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .copy-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
      letter-spacing: -0.01em;
    }

    .copy-btn:hover {
      opacity: 0.88;
    }

    .copy-btn:active {
      transform: scale(0.985);
    }

    .copy-btn.copied {
      background: var(--accent);
      color: #ffffff;
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ─── SCROLLBAR ─── */
    .preview-area::-webkit-scrollbar {
      width: 4px;
    }

    .preview-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .preview-area::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 2px;
    }

    /* ─── UTILS ─── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-logo">Relay</span>
    </div>
    <span class="header-platform" id="platform-label"></span>
  </div>

  <!-- State: Loading -->
  <div class="state-loading" id="state-loading">
    <div class="spinner"></div>
    <div class="loading-text">Reading conversation…</div>
  </div>

  <!-- State: Unsupported page -->
  <div class="state-unsupported hidden" id="state-unsupported">
    <div class="unsupported-icon">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5.5v3M8 10.5v.5"/></svg>
    </div>
    <div class="unsupported-title">Not on a supported page</div>
    <div class="unsupported-body">Open Relay on a conversation in one of these platforms:</div>
    <div class="unsupported-platforms">
      <span class="unsupported-chip">Claude.ai</span>
      <span class="unsupported-chip">ChatGPT</span>
      <span class="unsupported-chip">Gemini</span>
    </div>
  </div>

  <!-- State: Error (scrape returned 0 messages) -->
  <div class="state-error hidden" id="state-error">
    <div class="error-icon">
      <svg viewBox="0 0 16 16"><path d="M8 3l6 10H2L8 3z"/><path d="M8 8v2M8 11.5v.5"/></svg>
    </div>
    <div class="error-title">No messages found</div>
    <div class="error-body">Relay couldn't read this conversation. The page structure may have changed — the extension might need an update.</div>
  </div>

  <!-- State: Ready (preview + copy) -->
  <div class="state-ready hidden" id="state-ready">
    <div class="stats-bar">
      <div class="stats-left">
        <div class="stat">Messages <span class="stat-value" id="stat-messages">0</span></div>
        <div class="stat">Characters <span class="stat-value" id="stat-chars">~0</span></div>
      </div>
      <div class="toggle-container" id="compress-toggle-container">
        <span class="toggle-label">Compress</span>
        <label class="switch">
          <input type="checkbox" id="compress-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="preview-area">
      <pre class="preview-text" id="preview-content"></pre>
    </div>
    <div class="footer">
      <button class="copy-btn" id="copy-btn">
        <svg id="icon-copy" viewBox="0 0 16 16"><rect x="5" y="2" width="9" height="11" rx="1.5"/><path d="M2 5v9h9"/></svg>
        <svg id="icon-check" class="hidden" viewBox="0 0 16 16"><path d="M3 8.5l3.5 3.5L13 5"/></svg>
        <span id="copy-label">Copy handoff</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
